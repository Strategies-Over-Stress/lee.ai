<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px;
  }
  .terminal {
    background: #111118;
    border: 1px solid #2a2a35;
    border-radius: 16px;
    width: 620px;
    overflow: hidden;
    box-shadow:
      0 0 60px rgba(99, 102, 241, 0.08),
      0 25px 50px rgba(0, 0, 0, 0.5);
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: #1a1a24;
    border-bottom: 1px solid #2a2a35;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .dot.red { background: rgba(244, 63, 94, 0.7); }
  .dot.yellow { background: rgba(245, 158, 11, 0.7); }
  .dot.green { background: rgba(16, 185, 129, 0.7); }
  .title {
    margin-left: 10px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 12px;
    color: #6b7280;
  }
  .content {
    padding: 28px 24px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    font-size: 15px;
    line-height: 1.7;
  }
  .prompt {
    color: #10b981;
  }
  .command {
    color: #9ca3af;
  }
  .success {
    color: #818cf8;
  }
  .check {
    color: #10b981;
    margin-right: 6px;
  }
  .result-bad {
    color: #f43f5e;
    font-weight: 600;
    font-size: 17px;
  }
  .arrow {
    color: #f43f5e;
    margin-right: 4px;
  }
  .spacer {
    height: 20px;
  }
  .divider {
    height: 1px;
    background: #2a2a35;
    margin: 22px 0;
  }
  .watermark {
    text-align: right;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: #4b5563;
    padding: 0 24px 16px;
    letter-spacing: 0.5px;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="terminal">
    <div class="header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="title">ai-development-session</span>
    </div>
    <div class="content">
      <div><span class="prompt">$</span> <span class="command">ai fix checkout conversions</span></div>
      <div class="spacer"></div>
      <div><span class="check">✓</span> <span class="success">Optimized button color</span></div>
      <div><span class="check">✓</span> <span class="success">Reduced form fields</span></div>
      <div><span class="check">✓</span> <span class="success">Added loading spinner</span></div>
      <div><span class="check">✓</span> <span class="success">Fixed mobile layout</span></div>
      <div><span class="check">✓</span> <span class="success">Refactored checkout component</span></div>
      <div class="divider"></div>
      <div><span class="prompt">$</span> <span class="command">check conversion_rate</span></div>
      <div class="spacer"></div>
      <div class="result-bad"><span class="arrow">→</span> 0.0%&nbsp;&nbsp;(unchanged)</div>
    </div>
    <div class="watermark">richlee.dev</div>
  </div>
</body>
</html>
